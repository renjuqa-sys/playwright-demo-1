name: 🛠️ Debug Infrastructure Math
on:
  workflow_dispatch:

jobs:
  debug-math:
    strategy:
      matrix:
        shardIndex: [1, 2] # Simulates 2 different machines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Debug Test
        env:
          CI: true
          SHARD_INDEX: ${{ matrix.shardIndex }}
          TOTAL_SHARDS: 2
          WORKERS_PER_SHARD: 2
        # We target the 'infrastructure-check' project we just created
        run: npx playwright test --project=infrastructure-check --workers=2

      - name: Generate Step Summary
        if: always()
        run: |
          echo "### 🚀 Shard ${{ matrix.shardIndex }} Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Current Shard** | ${{ matrix.shardIndex }} of 2 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Workers Assigned** | 2 |" >> $GITHUB_STEP_SUMMARY
          echo "| **User Index Start** | $(((${{ matrix.shardIndex }} - 1) * 2)) |" >> $GITHUB_STEP_SUMMARY
          echo "| **User Index End** | $(((${{ matrix.shardIndex }} - 1) * 2 + 1)) |" >> $GITHUB_STEP_SUMMARY
          echo "✅ Math verified for this environment." >> $GITHUB_STEP_SUMMARY
