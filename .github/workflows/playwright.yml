name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'Production'
        type: choice
        options:
          - Development
          - Staging
          - Production

jobs:
  setup:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'Production' }}
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      WEB_USERS: ${{ secrets.WEB_USERS }}
      MOBILE_USERS: ${{ secrets.MOBILE_USERS }}
      APP_LOCALE: ${{ vars.APP_LOCALE }}
      SKIP_AUTH_CLEANUP: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
          cache: 'npm'
      - run: npm ci
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ steps.playwright-version.outputs.version }}-${{ runner.os }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright Dependencies
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps
      - name: Run Global Setup
        # Fix for project names identified in your logs
        run: npx playwright test --project=setup-web --project=setup-mobile
      - name: Upload Setup Debug Artifacts
        if: failure() # This ensures it runs even if the login fails
        uses: actions/upload-artifact@v4
        with:
          name: setup-failure-artifacts
          path: test-results/
          retention-days: 7
      - name: Upload Auth States
        uses: actions/upload-artifact@v4
        with:
          name: auth-states
          path: .auth/
          include-hidden-files: true
          retention-days: 1

  test:
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'Production' }}
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      WEB_USERS: ${{ secrets.WEB_USERS }}
      MOBILE_USERS: ${{ secrets.MOBILE_USERS }}
      APP_LOCALE: ${{ vars.APP_LOCALE }}
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
          cache: 'npm'
      - run: npm ci
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ steps.playwright-version.outputs.version }}-${{ runner.os }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright Dependencies
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps
      - name: Download Auth States
        uses: actions/download-artifact@v4
        with:
          name: auth-states
          path: .auth/
      - name: Run Sharded Tests
        run: >
          npx playwright test 
          --project=web-regression-guest 
          --project=web-regression-member 
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          --reporter=blob
      - name: Upload Shard Report (Blob)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1
      - name: Upload Test Results (Screenshots & Videos)
        if: failure() # Only runs if the tests fail
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-artifacts
          path: test-results/
          retention-days: 7

  merge-reports:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
      - run: npm ci
      - name: Download all shard reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge into HTML Report
        run: npm run "merge report"
      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: final-playwright-report
          path: playwright-report/
          retention-days: 30
