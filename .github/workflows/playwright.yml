name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Allows manual runs with environment selection from the GitHub UI
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'Staging'
        type: choice
        options:
          - Development
          - Staging
          - Production

jobs:
  # JOB 1: Validation, Setup & Lint
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1' # Matches your .nvmrc and engines
          cache: 'npm'
      - run: npm ci
      - name: Run Typecheck
        run: npm run typecheck
      - name: Run Lint Check
        run: npm run lint
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Global Setup
        run: npm run auth:setup # Matches script in your package.json
      - name: Upload Auth States
        uses: actions/upload-artifact@v4
        with:
          name: auth-states
          path: .auth/
          retention-days: 1

  # JOB 2: Sharded Test Execution
  test:
    needs: setup
    runs-on: ubuntu-latest
    # Selects the GitHub Environment based on manual input or defaults to Staging
    environment: ${{ github.event.inputs.environment || 'Production' }}
    env:
      BASE_URL: ${{ secrets.BASE_URL }} # Injected from GitHub Environment Secrets
      APP_LOCALE: ${{ secrets.APP_LOCALE }}
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Download Auth States
        uses: actions/download-artifact@v4
        with:
          name: auth-states
          path: .auth/
      - name: Run Sharded Tests
        run: >
          npx playwright test 
          --project=web-regression-guest 
          --project=web-regression-member 
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          --reporter=blob
      - name: Upload Shard Report (Blob)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1

  # JOB 3: Merge and Final HTML Report
  merge-reports:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
      - name: Install dependencies
        run: npm ci
      - name: Download all shard reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge into HTML Report
        run: npm run "merge report" # Note: matches your package.json script name
      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: final-playwright-report
          path: playwright-report/
          retention-days: 30
