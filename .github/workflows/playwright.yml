name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'Production'
        type: choice
        options:
          - Development
          - Staging
          - Production

jobs:
  setup:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'Production' }}
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      WEB_USERS: ${{ secrets.WEB_USERS }}
      MOBILE_USERS: ${{ secrets.MOBILE_USERS }}
      APP_LOCALE: ${{ vars.APP_LOCALE }}
      SKIP_AUTH_CLEANUP: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
      ##################################
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      ##################################
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      ##################################
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT
      ##################################
      #  Optimized Browser Cache (Chromium Only)
      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ steps.playwright-version.outputs.version }}-${{ runner.os }}
      ##################################
      - name: Install Playwright Browsers (Chromium Only)
        if:
          steps.cache-playwright.outputs.cache-hit != 'true'
          # Shave 30s by only installing chromium
        run: npx playwright install chromium --with-deps
      ##################################
      - name: Install Playwright Dependencies
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      ##################################
      - name: Run Global Setup
        run: npx playwright test --project=setup-web --project=setup-mobile
      ##################################
      - name: Upload Auth States
        uses: actions/upload-artifact@v4
        with:
          name: auth-states
          path: .auth/
          include-hidden-files: true
          retention-days: 1

  test:
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'Production' }}
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      WEB_USERS: ${{ secrets.WEB_USERS }}
      MOBILE_USERS: ${{ secrets.MOBILE_USERS }}
      APP_LOCALE: ${{ vars.APP_LOCALE }}
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
      ##################################
      # Re-use node_modules cache
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT
      ##################################

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      ##################################
      - name: Restore Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ steps.playwright-version.outputs.version }}-${{ runner.os }}
      ##################################
      - name: Install Playwright Dependencies
        run: npx playwright install-deps chromium
      ##################################
      - name: Download Auth States
        uses: actions/download-artifact@v4
        with:
          name: auth-states
          path: .auth/
      ##################################
      - name: Run Sharded Tests
        run: >
          npx playwright test 
          --project=web-regression-guest 
          --project=web-regression-member 
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          --reporter=blob
      ##################################
      - name: Upload Shard Report (Blob)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1
      ##################################
      - name: Upload Test Results (Screenshots & Videos)
        if: failure() # Only runs if the tests fail
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-artifacts
          path: test-results/
          retention-days: 7

  merge-reports:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      # Use a lightweight install for merging
      - name: Install Playwright only
        run: npm install @playwright/test

      - name: Download all shard reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: final-playwright-report
          path: playwright-report/
          retention-days: 30
